description: Vertiv sells data-center infrastructure (power, thermal, IT management) through a
  channel and direct enterprise sales. There is no public, self-service API pricing surface; any
  programmatic access (e.g. monitoring integrations for Liebert / Geist / Avocent gear) is bundled
  with the product, partner, or service contract.
