description: Vertiv does not publish public rate-limit documentation for its product integrations.
  Programmatic access (where it exists, e.g. Avocent / Liebert monitoring) is delivered as part of
  the product or service contract; throughput is governed by the device or the management software
  rather than a hosted gateway.
sources:
  - https://www.vertiv.com/en-us/
responseCodes: {}
limits:
  - name: Product / contract defined
    scope: product
    metric: varies
    limit: governed by the deployed Vertiv product or service contract; not publicly published
policies:
  - name: Product-bound throttling
    description: Where rate caps exist they are enforced by the Vertiv product (firmware on the
      managed device or the management software) rather than a public API gateway.
