description: Vertiv is a hardware + service provider for data-center power and thermal management.
  Spend is dominated by capex (hardware purchase) and service contracts rather than metered API
  billing, so the FinOps surface is a Contact Sales placeholder.
sources:
  - https://www.vertiv.com/en-us/
notes: No metered API billing or FOCUS-aligned cost-and-usage feed is published; meters describe
  the categories typical Vertiv invoices contain.
billingModel:
  pricingCategory: Hardware + Service Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: Vertiv
  ServiceCategory: Data Center Infrastructure
  ProviderName: Vertiv
  PublisherName: Vertiv Group Corporation
  BillingCurrency: USD
meters:
  - name: hardware_purchase
    unit: unit
    aggregation: sum
    dimensions:
      - product_family
  - name: service_contract
    unit: month
    aggregation: sum
    dimensions:
      - contract_type
      - site
principles:
  - name: Visibility
    description: Visibility comes from the Vertiv invoice and any deployed Vertiv management software
      (Environet, Trellis, Avocent) for asset and incident telemetry; there is no hosted billing API.
  - name: Allocation
    description: Spend is allocated by site / facility against the equipment install base; tag the
      asset register with cost-center on the consumer side.
  - name: Optimization
    description: Cost levers are right-sizing UPS / cooling capacity, multi-year service contracts,
      and refreshing aging units to lower-PUE families.
  - name: Accountability
    description: Facilities / data-center operations typically own Vertiv spend; finance reconciles
      against multi-year service agreements.
