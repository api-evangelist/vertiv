naftiko: 1.0.0-alpha2
info:
  label: Vertiv Environet Alert REST API — Circuits
  description: 'Vertiv Environet Alert REST API — Circuits. 1 operations. Lead operation: List All Circuits. Self-contained
    Naftiko capability covering one Vertiv business surface.'
  tags:
  - Vertiv
  - Circuits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERTIV_API_KEY: VERTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: environet-alert-circuits
    baseUri: https://{environet-host}/api
    description: Vertiv Environet Alert REST API — Circuits business capability. Self-contained, no shared references.
    resources:
    - name: circuits
      path: /circuits
      operations:
      - name: listcircuits
        method: GET
        description: List All Circuits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: circuitName
          in: query
          type: string
          description: Filter by circuit name
        - name: siteName
          in: query
          type: string
          description: Filter by site name
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.VERTIV_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: environet-alert-circuits-rest
    port: 8080
    description: REST adapter for Vertiv Environet Alert REST API — Circuits. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/circuits
      name: circuits
      description: REST surface for circuits.
      operations:
      - method: GET
        name: listcircuits
        description: List All Circuits
        call: environet-alert-circuits.listcircuits
        with:
          circuitName: rest.circuitName
          siteName: rest.siteName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: environet-alert-circuits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vertiv Environet Alert REST API — Circuits. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-all-circuits
      description: List All Circuits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: environet-alert-circuits.listcircuits
      with:
        circuitName: tools.circuitName
        siteName: tools.siteName
      outputParameters:
      - type: object
        mapping: $.
