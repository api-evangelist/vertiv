naftiko: "1.0.0-alpha1"

info:
  label: "Vertiv Environet Alert API"
  description: >-
    Vertiv Environet Alert REST API for DCIM monitoring including devices,
    sensors, alarms, racks, circuits, and assets across data center environments.
  tags:
    - Alarms
    - Asset Management
    - DCIM
    - Environmental Monitoring
    - Infrastructure Monitoring
    - Sensors
    - Vertiv
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VERTIV_ENVIRONET_TOKEN: VERTIV_ENVIRONET_TOKEN
      VERTIV_ENVIRONET_HOST: VERTIV_ENVIRONET_HOST

capability:
  consumes:
    - type: http
      namespace: environet
      baseUri: "https://{{env.VERTIV_ENVIRONET_HOST}}/api"
      description: "Vertiv Environet Alert REST API for DCIM monitoring"
      authentication:
        type: apikey
        key: X-Auth-Token
        value: "{{env.VERTIV_ENVIRONET_TOKEN}}"
        placement: header
      resources:
        - name: authentication
          path: /auth
          description: "Session authentication management"
          operations:
            - name: authenticate
              method: POST
              description: "Authenticate and Get Session Token"
              body:
                type: form
                data:
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: datasets
          path: /datasets
          description: "Top-level data set entity catalog"
          operations:
            - name: list-datasets
              method: GET
              description: "List All Data Sets"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-dataset-by-category
              method: GET
              description: "Get Data Set by Category"
              inputParameters:
                - name: category
                  in: path
                  type: string
                  required: true
                  description: "The data set category (GROUP, LOCATION, RACK, DEVICE, CIRCUIT, POINT, ALARM)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: devices
          path: /devices
          description: "Monitored devices in the DCIM system"
          operations:
            - name: list-devices
              method: GET
              description: "List All Devices"
              inputParameters:
                - name: siteName
                  in: query
                  type: string
                  required: false
                  description: "Filter by site name"
                - name: groupPath
                  in: query
                  type: string
                  required: false
                  description: "Filter by group path"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by device status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-device
              method: GET
              description: "Get Device by ID"
              inputParameters:
                - name: deviceId
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alarms
          path: /alarms
          description: "Active alarms and alert management"
          operations:
            - name: list-alarms
              method: GET
              description: "List Active Alarms"
              inputParameters:
                - name: severity
                  in: query
                  type: string
                  required: false
                  description: "Filter by alarm severity (ALARM, WARNING, INFO)"
                - name: alarmSource
                  in: query
                  type: string
                  required: false
                  description: "Filter by alarm source device"
                - name: siteName
                  in: query
                  type: string
                  required: false
                  description: "Filter by site name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: racks
          path: /racks
          description: "Data center rack monitoring"
          operations:
            - name: list-racks
              method: GET
              description: "List All Racks"
              inputParameters:
                - name: rackName
                  in: query
                  type: string
                  required: false
                  description: "Filter by rack name"
                - name: siteName
                  in: query
                  type: string
                  required: false
                  description: "Filter by site name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: circuits
          path: /circuits
          description: "Electrical circuit monitoring"
          operations:
            - name: list-circuits
              method: GET
              description: "List All Circuits"
              inputParameters:
                - name: circuitName
                  in: query
                  type: string
                  required: false
                  description: "Filter by circuit name"
                - name: siteName
                  in: query
                  type: string
                  required: false
                  description: "Filter by site name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: assets
          path: /assets
          description: "IT asset inventory"
          operations:
            - name: list-assets
              method: GET
              description: "List All Assets"
              inputParameters:
                - name: assetName
                  in: query
                  type: string
                  required: false
                  description: "Filter by asset name"
                - name: rackName
                  in: query
                  type: string
                  required: false
                  description: "Filter by rack name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sensors
          path: /sensors
          description: "Environmental sensor data points"
          operations:
            - name: list-sensors
              method: GET
              description: "List All Sensor Points"
              inputParameters:
                - name: deviceName
                  in: query
                  type: string
                  required: false
                  description: "Filter by parent device name"
                - name: siteName
                  in: query
                  type: string
                  required: false
                  description: "Filter by site name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: environet-rest
      resources:
        - path: /v1/devices
          name: devices
          description: "Monitored devices"
          operations:
            - method: GET
              name: list-devices
              description: "List All Devices"
        - path: /v1/devices/{deviceId}
          name: device
          description: "Single device by ID"
          operations:
            - method: GET
              name: get-device
              description: "Get Device by ID"
        - path: /v1/alarms
          name: alarms
          description: "Active alarms"
          operations:
            - method: GET
              name: list-alarms
              description: "List Active Alarms"
        - path: /v1/sensors
          name: sensors
          description: "Sensor data points"
          operations:
            - method: GET
              name: list-sensors
              description: "List All Sensor Points"
        - path: /v1/racks
          name: racks
          description: "Data center racks"
          operations:
            - method: GET
              name: list-racks
              description: "List All Racks"
        - path: /v1/circuits
          name: circuits
          description: "Electrical circuits"
          operations:
            - method: GET
              name: list-circuits
              description: "List All Circuits"
        - path: /v1/assets
          name: assets
          description: "IT assets"
          operations:
            - method: GET
              name: list-assets
              description: "List All Assets"

    - type: mcp
      port: 9100
      namespace: environet-mcp
      transport: http
      tools:
        - name: list-devices
          description: "List all monitored devices in the Environet system"
          hints:
            readOnly: true
            openWorld: true
        - name: get-device
          description: "Get details for a specific monitored device"
          hints:
            readOnly: true
            openWorld: false
        - name: list-alarms
          description: "List active alarms with optional severity and site filters"
          hints:
            readOnly: true
            openWorld: true
        - name: list-sensors
          description: "List all environmental sensor data points"
          hints:
            readOnly: true
            openWorld: true
        - name: list-racks
          description: "List all monitored racks in the data center"
          hints:
            readOnly: true
            openWorld: true
        - name: list-circuits
          description: "List all electrical circuits with power readings"
          hints:
            readOnly: true
            openWorld: true
        - name: list-assets
          description: "List all tracked IT assets"
          hints:
            readOnly: true
            openWorld: true
