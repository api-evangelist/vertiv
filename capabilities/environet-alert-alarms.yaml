naftiko: 1.0.0-alpha2
info:
  label: Vertiv Environet Alert REST API — Alarms
  description: 'Vertiv Environet Alert REST API — Alarms. 1 operations. Lead operation: List Active Alarms. Self-contained
    Naftiko capability covering one Vertiv business surface.'
  tags:
  - Vertiv
  - Alarms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VERTIV_API_KEY: VERTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: environet-alert-alarms
    baseUri: https://{environet-host}/api
    description: Vertiv Environet Alert REST API — Alarms business capability. Self-contained, no shared references.
    resources:
    - name: alarms
      path: /alarms
      operations:
      - name: listalarms
        method: GET
        description: List Active Alarms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: severity
          in: query
          type: string
          description: Filter alarms by severity level
        - name: alarmSource
          in: query
          type: string
          description: Filter by alarm source device or asset name
        - name: siteName
          in: query
          type: string
          description: Filter by site name
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.VERTIV_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: environet-alert-alarms-rest
    port: 8080
    description: REST adapter for Vertiv Environet Alert REST API — Alarms. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/alarms
      name: alarms
      description: REST surface for alarms.
      operations:
      - method: GET
        name: listalarms
        description: List Active Alarms
        call: environet-alert-alarms.listalarms
        with:
          severity: rest.severity
          alarmSource: rest.alarmSource
          siteName: rest.siteName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: environet-alert-alarms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vertiv Environet Alert REST API — Alarms. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-active-alarms
      description: List Active Alarms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: environet-alert-alarms.listalarms
      with:
        severity: tools.severity
        alarmSource: tools.alarmSource
        siteName: tools.siteName
      outputParameters:
      - type: object
        mapping: $.
